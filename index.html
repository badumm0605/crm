<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM Мастера</title>
    <link href="file:///android_asset/css/bootstrap.min.css" rel="stylesheet">
    <link href="file:///android_asset/fwa/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-bottom: 80px; }
        /* Шапка со статистикой */
        .crm-header {
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a4a 100%);
            color: white; border-radius: 20px;
        }
        /* Карточка заказа */
        .order-card { 
            border-radius: 16px; border: none; border-left: 5px solid #ffc107; transition: 0.2s;
        }
        .order-card.completed { border-left-color: #198754; opacity: 0.9; }
        
        .phone-link { color: #0d6efd; text-decoration: none; font-weight: 600; }
        .financial-row { background-color: #f8f9fa; border-radius: 8px; padding: 8px; }
        
        .fab {
            position: fixed; bottom: 24px; right: 24px;
            width: 60px; height: 60px; border-radius: 30px; font-size: 24px;
            box-shadow: 0 4px 12px rgba(30, 30, 47, 0.4);
            z-index: 1040; display: flex; align-items: center; justify-content: center;
            background-color: #2a2a4a; color: white; border: none;
        }
    </style>
</head>
<body>
<div id="mainScreen">
    <div class="container py-3">
        <div class="alert alert-warning mt-4 shadow-sm border-0">
    <h6 class="fw-bold"><i class="fa-solid fa-bug me-2"></i>Панель разработчика</h6>
    <p class="small mb-3">Генерация большой базы для тестов производительности.</p>
    <button class="btn btn-dark btn-sm w-100 mb-2 fw-bold" onclick="generateTestData()" id="btnGenerate">
        Сгенерировать 10 000 заказов
    </button>
    <button class="btn btn-outline-danger btn-sm w-100 fw-bold" onclick="clearDatabase()">
        Очистить базу
    </button>
</div>
        <div class="crm-header p-4 mb-4 shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="mb-0 fw-bold"><i class="fa-solid fa-toolbox me-2"></i>Рабочие заказы</h5>
            </div>
            <p class="mb-1 mt-3 opacity-75 small">Чистая прибыль (все время)</p>
            <h2 class="fw-bold mb-0 text-success" id="totalNetProfit">0 ₽</h2>
        </div>

        <ul class="nav nav-pills nav-fill mb-3 bg-white rounded-3 shadow-sm p-1" id="orderTabs" style="border: 1px solid #dee2e6;">
    <li class="nav-item">
        <a class="nav-link active fw-bold rounded-3" href="#" id="tabActive" onclick="setFilter('active'); return false;">
            В работе
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link fw-bold rounded-3 text-muted" href="#" id="tabCompleted" onclick="setFilter('completed'); return false;">
            Завершенные
        </a>
    </li>
</ul>

        <div id="ordersList" class="d-flex flex-column gap-3"></div>
    </div>

    <button class="fab" onclick="showOrderModal()">
        <i class="fa-solid fa-plus"></i>
    </button>
</div>

<div id="detailScreen" class="d-none">
    <div class="container py-3">
        <div class="d-flex align-items-center mb-4 pt-1">
            <button class="btn btn-light rounded-circle me-3 shadow-sm" onclick="closeDetailScreen()" style="width: 40px; height: 40px;">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h5 class="mb-0 fw-bold text-truncate" id="detAddress">Адрес</h5>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between mb-3 pb-3 border-bottom">
                    <div>
                        <small class="text-muted d-block">Статус</small>
                        <span id="detStatus"></span>
                    </div>
                    <div class="text-end">
                        <small class="text-muted d-block">Дата</small>
                        <strong id="detDate"></strong>
                    </div>
                </div>

                <div class="mb-3">
                    <small class="text-muted d-block">Клиент</small>
                    <strong id="detClient" class="fs-5"></strong>
                </div>

                <div class="mb-3">
                    <small class="text-muted d-block">Телефон</small>
                    <a href="#" id="detPhoneBtn" class="btn btn-outline-primary btn-sm mt-1 rounded-pill fw-bold">
                        <i class="fa-solid fa-phone me-2"></i><span id="detPhone"></span>
                    </a>
                </div>

                <div class="mb-3 pb-3 border-bottom">
                    <small class="text-muted d-block">Описание работ</small>
                    <span id="detDesc"></span>
                </div>

                <div class="row text-center g-2 pt-2">
                    <div class="col-4">
                        <small class="text-muted d-block">Общий</small>
                        <strong id="detTotal" class="text-dark">0 ₽</strong>
                    </div>
                    <div class="col-4 border-start border-end">
                        <small class="text-muted d-block">Расход</small>
                        <strong id="detParts" class="text-danger">0 ₽</strong>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block">Чистая</small>
                        <strong id="detNet" class="text-success">0 ₽</strong>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn btn-primary w-100 py-3 rounded-3 fw-bold mb-2 shadow-sm" onclick="openEditModal()">
            <i class="fa-solid fa-pen me-2"></i>Редактировать заказ
        </button>
        <button class="btn btn-outline-danger w-100 py-3 rounded-3" onclick="deleteOrder()">
            <i class="fa-solid fa-trash-can me-2"></i>Удалить заказ
        </button>
    </div>
</div>
<div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered align-items-end mb-0" style="min-height: 100vh;">
        <div class="modal-content border-0 rounded-top-4" style="border-bottom-left-radius: 0; border-bottom-right-radius: 0;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="modalTitle">Заказ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="orderId">
                
                <div class="mb-3 position-relative">
                    <label class="form-label text-muted small mb-1">Адрес</label>
                    <input type="text" id="orderAddress" class="form-control fw-bold" placeholder="ул. Ленина 1, кв 2" autocomplete="off" oninput="handleAddressSearch(this.value)">
                    <ul id="addressSuggestions" class="dropdown-menu w-100 shadow-lg border-0" style="display: none; position: absolute; top: 100%; left: 0; z-index: 1060; max-height: 250px; overflow-y: auto;"></ul>
                </div>
                
                <div class="row g-2 mb-3 position-relative">
                    <div class="col-6">
                        <label class="form-label text-muted small mb-1">Имя клиента</label>
                        <input type="text" id="orderClient" class="form-control" placeholder="Иван" autocomplete="off" oninput="handleContactSearch(this.value)">
                    </div>
                    <div class="col-6">
                        <label class="form-label text-muted small mb-1">Телефон</label>
                        <input type="tel" id="orderPhone" class="form-control" placeholder="8999..." autocomplete="off" oninput="handleContactSearch(this.value)">
                    </div>
                    <ul id="contactSuggestions" class="dropdown-menu w-100 shadow-lg border-0" style="display: none; position: absolute; top: 100%; left: 0; z-index: 1060; max-height: 200px; overflow-y: auto;"></ul>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small mb-1">Описание поломки / работ</label>
                    <textarea id="orderDesc" class="form-control" rows="2" placeholder="Замена подшипников..."></textarea>
                </div>

                <div class="row g-2 mb-4 p-3 bg-light rounded-3 border">
                    <h6 class="w-100 fw-bold text-center mb-3">Финансы</h6>
                    <div class="col-6">
                        <label class="form-label text-muted small mb-1">Общий чек (₽)</label>
                        <input type="number" id="orderTotal" class="form-control fw-bold text-success" placeholder="0" oninput="calcNet()">
                    </div>
                    <div class="col-6">
                        <label class="form-label text-muted small mb-1">Расход / Запчасти (₽)</label>
                        <input type="number" id="orderParts" class="form-control fw-bold text-danger" placeholder="0" oninput="calcNet()">
                    </div>
                    <div class="col-12 mt-2 text-center">
                        <span class="text-muted small">Чистая прибыль: </span>
                        <span id="orderNet" class="fw-bold fs-5">0 ₽</span>
                    </div>
                </div>

                <button class="btn btn-primary w-100 py-3 rounded-3 fw-bold mb-2" onclick="saveOrder(false)">
                    Сохранить черновик
                </button>
                <button class="btn btn-success w-100 py-3 rounded-3 fw-bold" onclick="saveOrder(true)" id="btnComplete">
                    <i class="fa-solid fa-check-double me-2"></i>Завершить заказ
                </button>
            </div>
        </div>
    </div>
</div>
<script src="file:///android_asset/js/bootstrap.bundle.min.js"></script>
    <script src="streets.js"></script>
<script>
 const DB_NAME = "finance_bus.db";
const orderModal = new bootstrap.Modal(document.getElementById('orderModal'));

// === ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===
let allOrders = [];
let currentViewedOrder = null;
let currentFilter = 'active'; // 'active' или 'completed'
let currentOffset = 0;        
const LOAD_LIMIT = 20;        
let isLoading = false;        
let hasMoreData = true;       

// === ПЕРЕХВАТ АППАРАТНОЙ КНОПКИ НАЗАД ===
window.addEventListener('popstate', function(event) {
    const state = event.state;
    if (document.getElementById('orderModal').classList.contains('show')) {
        orderModal.hide();
    }
    if (!state || !state.page) {
        document.getElementById('detailScreen').classList.add('d-none');
        document.getElementById('mainScreen').classList.remove('d-none');
        currentViewedOrder = null;
    } else if (state.page === 'detail') {
        document.getElementById('mainScreen').classList.add('d-none');
        document.getElementById('detailScreen').classList.remove('d-none');
    }
});

document.getElementById('orderModal').addEventListener('hide.bs.modal', function (event) {
    if (history.state && history.state.page === 'modal') {
        history.back();
    }
});

// === ИНИЦИАЛИЗАЦИЯ БД ===
function initDb() {
    if (!window.Android || !window.Android.executeSql) {
        console.error("Android Bridge недоступен.");
        return;
    }

    window.Android.executeSql(DB_NAME, `
        CREATE TABLE IF NOT EXISTS orders (
            id INTEGER PRIMARY KEY, address TEXT, client_name TEXT, phone TEXT,
            description TEXT, total_sum REAL, parts_sum REAL, net_sum REAL,
            timestamp INTEGER, is_completed INTEGER DEFAULT 0
        )
    `);
    
    window.Android.executeSql(DB_NAME, `
        CREATE TABLE IF NOT EXISTS transactions (
            id INTEGER PRIMARY KEY AUTOINCREMENT, type TEXT, amount REAL, 
            category TEXT, note TEXT, timestamp INTEGER, source_app TEXT DEFAULT 'finance'
        )
    `);

    loadOrders(true);
}

// === ПАГИНАЦИЯ И ФИЛЬТРАЦИЯ ===
function setFilter(filterType) {
    if (currentFilter === filterType) return;
    
    currentFilter = filterType;
    const tabActive = document.getElementById('tabActive');
    const tabCompleted = document.getElementById('tabCompleted');
    
    if (filterType === 'active') {
        tabActive.classList.add('active', 'text-dark');
        tabActive.classList.remove('text-muted');
        tabCompleted.classList.remove('active', 'text-dark');
        tabCompleted.classList.add('text-muted');
    } else {
        tabCompleted.classList.add('active', 'text-dark');
        tabCompleted.classList.remove('text-muted');
        tabActive.classList.remove('active', 'text-dark');
        tabActive.classList.add('text-muted');
    }
    
    loadOrders(true);
}

function loadOrders(reset = false) {
    if (reset) {
        currentOffset = 0;
        hasMoreData = true;
        allOrders = [];
        document.getElementById('ordersList').innerHTML = '';
        
       try {
            const sumSql = "SELECT SUM(net_sum) as total FROM orders WHERE is_completed=1";
            const sumResult = JSON.parse(window.Android.querySql(DB_NAME, sumSql));
            
            // Превращаем результат в чистое число
            const totalNet = Number(sumResult[0].total || 0);
            
            // Форматируем по стандартам РФ (будет 16 554 000 вместо 1.6554e+07)
            document.getElementById('totalNetProfit').innerText = totalNet.toLocaleString('ru-RU') + ' ₽';
            
        } catch (e) { console.error("Ошибка подсчета прибыли:", e); }
    }

    if (!hasMoreData || isLoading) return;
    isLoading = true;

    const isCompleted = currentFilter === 'completed' ? 1 : 0;
    const sql = `SELECT * FROM orders WHERE is_completed=${isCompleted} ORDER BY timestamp DESC LIMIT ${LOAD_LIMIT} OFFSET ${currentOffset}`;
    
    try {
        const jsonResult = window.Android.querySql(DB_NAME, sql);
        const newOrders = JSON.parse(jsonResult);
        
        if (newOrders.length < LOAD_LIMIT) hasMoreData = false;
        
        allOrders = allOrders.concat(newOrders);
        currentOffset += newOrders.length;
        
        renderOrdersChunk(newOrders, reset);
    } catch (e) { console.error("Ошибка при загрузке:", e); }
    
    isLoading = false;
}

function renderOrdersChunk(ordersChunk, isReset) {
    const container = document.getElementById('ordersList');

    if (isReset && ordersChunk.length === 0) {
        const emptyText = currentFilter === 'active' ? 'Нет заказов в работе' : 'Нет завершенных заказов';
        container.innerHTML = `<p class="text-center text-muted mt-4">${emptyText}</p>`;
        return;
    }

    let htmlChunk = '';
    ordersChunk.forEach(o => {
        const dateStr = new Date(o.timestamp).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
        const statusBadge = o.is_completed 
            ? '<span class="badge bg-success"><i class="fa-solid fa-check me-1"></i>Выполнен</span>' 
            : '<span class="badge bg-warning text-dark"><i class="fa-solid fa-clock me-1"></i>В работе</span>';

        const safeClient = o.client_name ? o.client_name.replace(/'/g, "&apos;") : 'Не указан';
        const safePhone = o.phone ? o.phone.replace(/'/g, "&apos;") : 'Нет';

        htmlChunk += `
            <div class="card order-card shadow-sm ${o.is_completed ? 'completed' : ''}" onclick="openDetailScreen(${o.id})">
                <div class="card-body p-3">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="fw-bold mb-0 text-truncate pe-2" style="max-width: 70%;">${o.address}</h6>
                        <div class="text-end" style="font-size: 0.75rem;">${dateStr}<br>${statusBadge}</div>
                    </div>
                    <div class="d-flex align-items-center mb-2" style="font-size: 0.9rem;">
                        <i class="fa-solid fa-user text-muted me-2"></i> <span class="text-truncate" style="max-width: 100px;">${safeClient}</span>
                        <span class="mx-2 text-muted">•</span> 
                        <span class="text-primary"><i class="fa-solid fa-phone me-1"></i>${safePhone}</span>
                    </div>
                    <div class="financial-row d-flex justify-content-between text-center small mt-3">
                        <div><span class="text-muted d-block" style="font-size: 0.7rem;">Общ</span><strong class="text-dark">${Number(o.total_sum || 0).toLocaleString('ru-RU')}</strong></div>
                        <div><span class="text-muted d-block" style="font-size: 0.7rem;">Расх</span><strong class="text-danger">${Number(o.parts_sum || 0).toLocaleString('ru-RU')}</strong></div>
                        <div><span class="text-muted d-block" style="font-size: 0.7rem;">Чист</span><strong class="text-success">${Number(o.net_sum || 0).toLocaleString('ru-RU')}</strong></div>
                    </div>
                </div>
            </div>
        `;
    });

    container.insertAdjacentHTML('beforeend', htmlChunk);
}

window.addEventListener('scroll', () => {
    if (document.getElementById('mainScreen').classList.contains('d-none')) return;
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 300) {
        loadOrders(false);
    }
});

// === УПРАВЛЕНИЕ ЭКРАНАМИ И МОДАЛКОЙ ===
function openDetailScreen(orderId) {
    currentViewedOrder = allOrders.find(o => o.id === orderId);
    if (!currentViewedOrder) return;
    const o = currentViewedOrder;

    document.getElementById('detAddress').innerText = o.address;
    document.getElementById('detClient').innerText = o.client_name || 'Не указан';
    document.getElementById('detPhone').innerText = o.phone || 'Не указан';
    document.getElementById('detPhoneBtn').href = o.phone ? `tel:${o.phone}` : '#';
    document.getElementById('detDesc').innerText = o.description || 'Нет описания';
    document.getElementById('detTotal').innerText = Number(o.total_sum || 0).toLocaleString('ru-RU') + ' ₽';
    document.getElementById('detParts').innerText = Number(o.parts_sum || 0).toLocaleString('ru-RU') + ' ₽';
    document.getElementById('detNet').innerText = Number(o.net_sum || 0).toLocaleString('ru-RU') + ' ₽';
    document.getElementById('detDate').innerText = new Date(o.timestamp).toLocaleDateString('ru-RU');
    document.getElementById('detStatus').innerHTML = o.is_completed ? '<span class="badge bg-success">Выполнен</span>' : '<span class="badge bg-warning text-dark">В работе (Черновик)</span>';

    document.getElementById('mainScreen').classList.add('d-none');
    document.getElementById('detailScreen').classList.remove('d-none');
    window.scrollTo(0, 0);
    history.pushState({ page: 'detail' }, "Detail", "#detail");
}

function closeDetailScreen() { history.back(); }

function showOrderModal() {
    document.getElementById('orderId').value = '';
    document.getElementById('orderAddress').value = '';
    document.getElementById('orderClient').value = '';
    document.getElementById('orderPhone').value = '';
    document.getElementById('orderDesc').value = '';
    document.getElementById('orderTotal').value = '';
    document.getElementById('orderParts').value = '';
    document.getElementById('orderNet').innerText = '0 ₽';
    
    document.getElementById('btnComplete').classList.remove('d-none');
    orderModal.show();
    history.pushState({ page: 'modal' }, "Modal", "#modal");
}

function openEditModal() {
    try {
        if (!currentViewedOrder) return;
        const o = currentViewedOrder;

        document.getElementById('orderId').value = o.id || '';
        document.getElementById('orderAddress').value = o.address || '';
        document.getElementById('orderClient').value = o.client_name || '';
        document.getElementById('orderPhone').value = o.phone || '';
        document.getElementById('orderDesc').value = o.description || '';
        document.getElementById('orderTotal').value = o.total_sum || '';
        document.getElementById('orderParts').value = o.parts_sum || '';
        calcNet();
        
        const btnComplete = document.getElementById('btnComplete');
        if (btnComplete) {
            if (o.is_completed) btnComplete.classList.add('d-none');
            else btnComplete.classList.remove('d-none');
        }
        
        orderModal.show();
        try { history.pushState({ page: 'modal' }, "Modal", "#modal"); } catch(e) {}
    } catch (e) { alert("Ошибка: " + e.message); }
}

function calcNet() {
    const total = parseFloat(document.getElementById('orderTotal').value) || 0;
    const parts = parseFloat(document.getElementById('orderParts').value) || 0;
    document.getElementById('orderNet').innerText = (total - parts) + ' ₽';
}

function deleteOrder() {
    if (!currentViewedOrder) return;
    const orderId = currentViewedOrder.id;

    if (confirm("Вы уверены? Будет удален и сам заказ, и все связанные транзакции.")) {
        window.Android.executeSql(DB_NAME, `DELETE FROM transactions WHERE source_app='crm' AND note LIKE '[CRM-${orderId}]%'`);
        window.Android.executeSql(DB_NAME, `DELETE FROM orders WHERE id=${orderId}`);
        loadOrders(true); 
        history.back(); 
    }
}

function saveOrder(markAsCompleted) {
    const idInput = document.getElementById('orderId').value;
    const orderId = idInput ? parseInt(idInput) : Date.now();
    
    const address = document.getElementById('orderAddress').value.replace(/'/g, "''");
    const client = document.getElementById('orderClient').value.replace(/'/g, "''");
    const phone = document.getElementById('orderPhone').value.replace(/'/g, "''");
    const desc = document.getElementById('orderDesc').value.replace(/'/g, "''");
    
    const total = parseFloat(document.getElementById('orderTotal').value) || 0;
    const parts = parseFloat(document.getElementById('orderParts').value) || 0;
    const net = total - parts;
    const isCompleted = markAsCompleted ? 1 : 0;
    const ts = idInput ? Date.now() : orderId;

    let sql = idInput 
        ? `UPDATE orders SET address='${address}', client_name='${client}', phone='${phone}', description='${desc}', total_sum=${total}, parts_sum=${parts}, net_sum=${net}, is_completed=${isCompleted} WHERE id=${orderId}`
        : `INSERT INTO orders (id, address, client_name, phone, description, total_sum, parts_sum, net_sum, timestamp, is_completed) VALUES (${orderId}, '${address}', '${client}', '${phone}', '${desc}', ${total}, ${parts}, ${net}, ${ts}, ${isCompleted})`;
    
    window.Android.executeSql(DB_NAME, sql);
    window.Android.executeSql(DB_NAME, `DELETE FROM transactions WHERE source_app='crm' AND note LIKE '[CRM-${orderId}]%'`);

    if (markAsCompleted) {
        if (total > 0) window.Android.executeSql(DB_NAME, `INSERT INTO transactions (type, amount, category, note, timestamp, source_app) VALUES ('income', ${total}, 'Услуги ремонта', '[CRM-${orderId}] ${address}', ${Date.now()}, 'crm')`);
        if (parts > 0) window.Android.executeSql(DB_NAME, `INSERT INTO transactions (type, amount, category, note, timestamp, source_app) VALUES ('expense', ${parts}, 'Бизнес (Запчасти)', '[CRM-${orderId}] Запчасти: ${address}', ${Date.now() + 1000}, 'crm')`);
    }

    orderModal.hide();
    loadOrders(true);
    if (!document.getElementById('detailScreen').classList.contains('d-none')) {
        closeDetailScreen();
    }
}

// === ПОИСК КОНТАКТОВ ===
function handleContactSearch(query) {
    const dropdown = document.getElementById('contactSuggestions');
    if (!query || query.length < 2) { dropdown.style.display = 'none'; return; }

    if (window.Android && window.Android.searchContacts) {
        const contacts = JSON.parse(window.Android.searchContacts(query));
        if (contacts.length === 0) { dropdown.style.display = 'none'; return; }

        dropdown.innerHTML = '';
        contacts.forEach(c => {
            const safeName = c.name.replace(/'/g, "\\'");
            const safePhone = c.phone.replace(/'/g, "\\'");
            dropdown.innerHTML += `
                <li><a class="dropdown-item py-2" href="#" onclick="selectContact('${safeName}', '${safePhone}'); return false;">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-truncate" style="max-width: 60%;">${c.name}</span>
                        <span class="small text-muted">${c.phone}</span>
                    </div>
                </a></li>`;
        });
        dropdown.style.display = 'block';
    }
}

function selectContact(name, phone) {
    document.getElementById('orderClient').value = name;
    document.getElementById('orderPhone').value = phone;
    document.getElementById('contactSuggestions').style.display = 'none';
}

// === ПОИСК АДРЕСОВ ===
function handleAddressSearch(query) {
    const dropdown = document.getElementById('addressSuggestions');
    if (!query || query.trim().length < 2) { dropdown.style.display = 'none'; return; }

    const searchTerms = query.toLowerCase().trim().split(/\s+/);
    const matches = (typeof SARATOV_STREETS !== 'undefined' ? SARATOV_STREETS : []).filter(street => {
        const normalizedStreet = street.toLowerCase().replace(/[-.]/g, ' ');
        return searchTerms.every(term => normalizedStreet.includes(term));
    }).slice(0, 10);

    if (matches.length === 0) { dropdown.style.display = 'none'; return; }

    dropdown.innerHTML = '';
    matches.forEach(street => {
        const safeStreet = street.replace(/'/g, "\\'"); 
        dropdown.innerHTML += `
            <li><a class="dropdown-item py-2 text-wrap" href="#" onclick="selectAddress('${safeStreet}'); return false;">
                <i class="fa-solid fa-location-dot text-muted me-2"></i><span>${street}</span>
            </a></li>`;
    });
    dropdown.style.display = 'block';
}

function selectAddress(street) {
    const addressInput = document.getElementById('orderAddress');
    addressInput.value = street + ', д. ';
    document.getElementById('addressSuggestions').style.display = 'none';
    addressInput.focus();
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('#contactSuggestions') && !e.target.closest('#orderClient') && !e.target.closest('#orderPhone')) {
        const el = document.getElementById('contactSuggestions');
        if(el) el.style.display = 'none';
    }
    if (!e.target.closest('#addressSuggestions') && !e.target.closest('#orderAddress')) {
        const el = document.getElementById('addressSuggestions');
        if(el) el.style.display = 'none';
    }
});

// === ТЕСТИРОВАНИЕ ===
function generateTestData() {
    if (!confirm("Это добавит 10 000 записей. Продолжить?")) return;
    const btn = document.getElementById('btnGenerate');
    btn.disabled = true; btn.innerText = "Идет генерация...";

    const names = ["Александр", "Елена", "Максим", "Ольга", "Иван", "Анна", "Сергей", "Наталья"];
    let totalInserted = 0;
    
    function insertBatch() {
        let sql = "INSERT INTO orders (id, address, client_name, phone, description, total_sum, parts_sum, net_sum, timestamp, is_completed) VALUES ";
        let values = [];
        for (let i = 0; i < 500; i++) {
            const id = Date.now() + totalInserted + i;
            const street = (typeof SARATOV_STREETS !== 'undefined' && SARATOV_STREETS.length > 0) ? SARATOV_STREETS[Math.floor(Math.random() * SARATOV_STREETS.length)] : "ул. Тестовая";
            const address = street + ", д. " + Math.floor(Math.random() * 150 + 1);
            const name = names[Math.floor(Math.random() * names.length)];
            const phone = "89" + Math.floor(100000000 + Math.random() * 900000000);
            const total = Math.floor(Math.random() * 50) * 100 + 1000;
            const parts = Math.floor(Math.random() * 15) * 100;
            const isCompleted = Math.random() > 0.4 ? 1 : 0;
            values.push(`(${id}, '${address}', '${name}', '${phone}', 'Тестовый', ${total}, ${parts}, ${total-parts}, ${Date.now() - Math.floor(Math.random() * 10000000000)}, ${isCompleted})`);
        }
        window.Android.executeSql(DB_NAME, sql + values.join(", "));
        totalInserted += 500;
        
        if (totalInserted < 10000) {
            btn.innerText = `Добавлено: ${totalInserted} / 10000`;
            setTimeout(insertBatch, 20);
        } else {
            btn.disabled = false; btn.innerText = "Сгенерировать 10 000 заказов";
            alert("Успешно добавлено!"); loadOrders(true);
        }
    }
    insertBatch();
}

function clearDatabase() {
    if (!confirm("ВНИМАНИЕ! База будет очищена. Вы уверены?")) return;
    window.Android.executeSql(DB_NAME, "DELETE FROM orders");
    window.Android.executeSql(DB_NAME, "DELETE FROM transactions WHERE source_app='crm'");
    loadOrders(true);
}

// === ЗАПУСК ===
window.addEventListener('DOMContentLoaded', initDb);
